<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f3f5f8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LT Trainer" />
    <title>Lithuanian Words Trainer</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Lithuanian Trainer</p>
        <button id="refresh-button" class="ghost-button" type="button">Sync sheet</button>
      </header>

      <main class="layout">
        <section class="panel controls-panel">
          <div class="panel-header">
            <h2>Review Settings</h2>
          </div>

          <label class="field">
            <span>Mode</span>
            <select id="direction-select">
              <option value="lt-ru">Lithuanian to Russian</option>
              <option value="ru-lt">Russian to Lithuanian</option>
              <option value="mixed">Mixed</option>
            </select>
          </label>

          <label class="field">
            <span>Filter</span>
            <select id="status-filter">
              <option value="all">All cards</option>
              <option value="new">New only</option>
              <option value="learned">Learned only</option>
              <option value="forgotten">Forgotten only</option>
            </select>
          </label>

          <label class="field checkbox-row">
            <input id="shuffle-toggle" type="checkbox" checked />
            <span>Shuffle deck</span>
          </label>

          <div class="stats-grid" id="stats-grid"></div>

          <div class="meta-block">
            <p id="sync-status">Waiting for first sync…</p>
            <p id="queue-status">Queue not loaded yet.</p>
          </div>
        </section>

        <section class="panel card-panel">
          <div class="card-topline">
            <span id="card-position">Card 0 of 0</span>
            <span id="card-direction">LT → RU</span>
          </div>

          <article class="flashcard" id="flashcard">
            <div class="card-face card-front">
              <p class="face-label">Prompt</p>
              <h2 id="prompt-text">Loading…</h2>
            </div>

            <div class="card-face card-back hidden" id="reveal-panel">
              <p class="face-label">Answer</p>
              <h3 id="answer-text"></h3>
              <dl class="detail-list">
                <div>
                  <dt>Pronunciation</dt>
                  <dd id="pronunciation-text"></dd>
                </div>
                <div>
                  <dt>Example</dt>
                  <dd id="examples-text"></dd>
                </div>
              </dl>
            </div>
          </article>

          <div class="action-row">
            <button id="reveal-button" class="primary-button" type="button">Reveal</button>
            <button id="next-button" class="ghost-button" type="button">Skip</button>
          </div>

          <div class="review-row hidden" id="review-actions">
            <button data-status="forgotten" class="status-button forgotten" type="button">
              Forgotten
            </button>
            <button data-status="new" class="status-button new" type="button">Keep New</button>
            <button data-status="learned" class="status-button learned" type="button">
              Learned
            </button>
          </div>

          <p class="status-pill" id="current-status-pill">Status: —</p>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
